version: '3.8'

services:
  # Complete NeMo + NIM Development Environment
  nemo-nim-dev:
    build:
      context: .
      dockerfile: Dockerfile.all
    image: nemo-nim-complete:latest
    container_name: nemo-nim-dev
    hostname: nemo-dev

    # GPU Support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Environment variables
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_NGC_API_KEY=${NVIDIA_NGC_API_KEY}
      - WANDB_API_KEY=${WANDB_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PYTHONPATH=/workspace
      - CUDA_VISIBLE_DEVICES=0
      - TORCH_CUDA_ARCH_LIST=7.5;8.0;8.6;8.9;9.0
      - CUBLAS_WORKSPACE_CONFIG=:4096:8
      - TOKENIZERS_PARALLELISM=false

    # Volumes
    volumes:
      # Mount project directory
      - ./:/workspace
      # Mount data directory
      - ./data:/data
      # Mount models directory
      - ./models:/models
      # Cache directories
      - nemo-cache:/root/.cache
      - huggingface-cache:/root/.cache/huggingface
      # Jupyter config
      - jupyter-data:/root/.jupyter

    # Ports
    ports:
      # FastAPI server
      - "8000:8000"
      # Jupyter Lab
      - "8888:8888"
      # TensorBoard
      - "6006:6006"
      # Prometheus metrics
      - "9090:9090"
      # Triton Inference Server (if needed)
      - "8001:8001"
      - "8002:8002"

    # Network
    networks:
      - nemo-network

    # Keep container running
    stdin_open: true
    tty: true

    # Working directory
    working_dir: /workspace

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; assert torch.cuda.is_available()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Resource limits (adjust based on your system)
    mem_limit: 32g
    memswap_limit: 32g
    shm_size: 16g

    # Command
    command: /bin/bash

  # NIM Inference Service (Production)
  nim-inference:
    image: nvcr.io/nvidia/nim/nim-llm:latest
    container_name: nim-inference
    hostname: nim-server
    profiles:
      - production

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_MODEL_NAME=gpt-oss-20b
      - NIM_MODEL_PATH=/models/gpt-oss-20b
      - NIM_PORT=8000
      - NIM_MAX_BATCH_SIZE=8
      - NIM_KVCACHE_PERCENT=0.75

    volumes:
      - ./models:/models
      - nim-cache:/opt/nim/cache

    ports:
      - "8080:8000"

    networks:
      - nemo-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Monitoring Stack (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles:
      - monitoring
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - nemo-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - nemo-network

# Networks
networks:
  nemo-network:
    driver: bridge

# Volumes
volumes:
  nemo-cache:
  huggingface-cache:
  jupyter-data:
  nim-cache:
  prometheus-data:
  grafana-data: