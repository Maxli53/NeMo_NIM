version: '3.8'

services:
  # Development container with NeMo
  nemo-dev:
    build:
      context: ../..
      dockerfile: nim/docker/Dockerfile
    image: nemo-gpt-oss:dev
    container_name: nemo-gpt-oss-dev
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - NEMO_CACHE_DIR=/workspace/.cache
      - TRANSFORMERS_CACHE=/workspace/.cache/transformers
      - HF_HOME=/workspace/.cache/huggingface
    volumes:
      - ../../workspace:/workspace
      - ../../scripts:/scripts
      - ../../configs:/configs
      - ../../data:/data
      - /mnt/c/Users/maxli/.cache/huggingface:/workspace/.cache/huggingface:ro
    shm_size: '16gb'
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    stdin_open: true
    tty: true
    command: /bin/bash

  # Training container
  nemo-train:
    extends: nemo-dev
    container_name: nemo-gpt-oss-train
    command: >
      bash -c "cd /scripts &&
      python train_gpt_oss.py --task finetune
      --experiment-name gpt_oss_training
      --num-gpus 1 --peft-scheme lora"

  # Inference container
  nemo-inference:
    extends: nemo-dev
    container_name: nemo-gpt-oss-inference
    ports:
      - "8000:8000"
    command: >
      bash -c "cd /scripts &&
      python generate.py
      --model-path /workspace/checkpoints/converted/gpt_oss_20b.nemo"

  # NIM deployment container (when model is ready)
  nim-server:
    image: nvcr.io/nim/openai/gpt-oss-20b:latest
    container_name: gpt-oss-nim-server
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NIM_MODEL_PATH=/models/gpt_oss_20b.nemo
      - NIM_SERVER_PORT=8000
      - NIM_BATCH_SIZE=1
      - NIM_MAX_SEQUENCE_LENGTH=2048
    volumes:
      - ../../workspace/checkpoints/converted:/models:ro
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  default:
    driver: bridge