# Multi-Agent Discussion System Configuration
# Mode: minimal | advanced | production

mode: "minimal"  # Start with minimal for testing

# Model Configuration
model:
  provider: "local"  # local | openai | anthropic
  model_path: "C:/Users/maxli/.cache/huggingface/hub/models--openai--gpt-oss-20b/snapshots/6cee5e81ee83917806bbde320786a8fb61efebee"
  trust_remote_code: true  # Required for custom architectures
  
  # Minimal mode - Conservative settings for testing
  minimal:
    device_map: "auto"
    torch_dtype: "float16"
    low_cpu_mem_usage: true
    max_memory:
      0: "20GB"      # GPU 0 limit
      "cpu": "30GB"  # CPU RAM for offloading
    offload_folder: "./offload"
    
  # Advanced mode - Optimized for performance
  advanced:
    device_map: "balanced"
    torch_dtype: "bfloat16"  # Better for long sequences
    low_cpu_mem_usage: true
    load_in_8bit: false  # Model already quantized with mxfp4
    offload_folder: "./offload"
    max_memory:
      0: "22GB"
      "cpu": "40GB"
    rope_scaling:
      type: "yarn"
      factor: 32.0
    
  # Production mode - Multi-GPU and optimization
  production:
    device_map: "sequential"  # For multi-GPU
    torch_dtype: "float16"
    low_cpu_mem_usage: true
    max_memory:
      0: "22GB"  # GPU 0
      1: "22GB"  # GPU 1 (if available)
      "cpu": "50GB"
    compile_model: false  # PyTorch 2.0 compilation
    use_flash_attention: true
    gradient_checkpointing: false

# Embedding Model Configuration
embedding:
  provider: "local"  # local | openai
  model_path: "C:/Users/maxli/.cache/huggingface/hub/models--sentence-transformers--all-MiniLM-L6-v2/snapshots/c9745ed1d9f207416be6d2e6f8de32d1f16199bf"
  dimension: 384
  max_sequence_length: 256
  
  minimal:
    batch_size: 16
    device: "cuda"  # Will fallback to CPU if not available
    normalize_embeddings: true
    
  advanced:
    batch_size: 32
    device: "cuda"
    normalize_embeddings: true
    show_progress_bar: true
    
  production:
    batch_size: 64
    device: "cuda"
    normalize_embeddings: true
    parallel_processing: true
    num_workers: 4

# Vector Database Configuration
vector_db:
  backend: "faiss"  # faiss | pinecone | weaviate
  
  minimal:
    index_type: "Flat"  # Simple, exact search
    metric: "cosine"
    use_gpu: false
    
  advanced:
    index_type: "IVF"  # Inverted file index
    nlist: 100  # Number of clusters
    nprobe: 10  # Clusters to search
    metric: "cosine"
    use_gpu: false  # Set to true if GPU available
    
  production:
    index_type: "HNSW"  # Hierarchical navigable small world
    M: 32  # Number of connections
    ef_construction: 200
    ef_search: 100
    metric: "cosine"
    use_gpu: true

# Agent Configuration
agents:
  # Expert agents
  experts:
    - name: "PhysicsExpert"
      domain: "quantum mechanics, relativity, particle physics, cosmology"
      temperature: 0.7
      max_tokens: 1000
      knowledge_base_path: "data/pdfs/physics/"
      
    - name: "BiologyExpert"
      domain: "molecular biology, genetics, neuroscience, evolution"
      temperature: 0.6
      max_tokens: 1000
      knowledge_base_path: "data/pdfs/biology/"
      
    - name: "AIResearcher"
      domain: "machine learning, deep learning, AGI, neural networks"
      temperature: 0.8
      max_tokens: 1000
      knowledge_base_path: "data/pdfs/ai/"
      
    - name: "ChemistryExpert"
      domain: "organic chemistry, materials science, nanotechnology"
      temperature: 0.65
      max_tokens: 1000
      knowledge_base_path: "data/pdfs/chemistry/"
  
  # Consensus agent
  consensus:
    name: "ConsensusAgent"
    temperature: 0.3  # Lower for more deterministic consensus
    max_tokens: 1500
    thresholds:
      novelty: 7.0      # Minimum novelty score (0-10)
      feasibility: 6.0  # Minimum feasibility score (0-10)
      confidence: 0.75  # Consensus confidence threshold

# Discussion Configuration
discussion:
  max_rounds: 10
  min_rounds: 3
  timeout_per_round: 120  # seconds
  parallel_responses: true
  
  minimal:
    max_rounds: 5
    parallel_responses: false  # Sequential for debugging
    
  advanced:
    max_rounds: 10
    parallel_responses: true
    early_stopping: true  # Stop if consensus reached early
    
  production:
    max_rounds: 15
    parallel_responses: true
    early_stopping: true
    adaptive_temperature: true  # Adjust temperature based on progress

# MCP Server Configuration
mcp:
  enabled: true
  host: "127.0.0.1"
  port: 8000
  api_prefix: "/api/v1"
  websocket_path: "/ws"
  
  cors:
    origins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "claude://desktop"
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]

# Logging Configuration
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  minimal:
    file: "logs/system.log"
    rotation: "10MB"
    backup_count: 3
    
  advanced:
    file: "logs/system.log"
    rotation: "daily"
    backup_count: 7
    structured_logging: true
    
  production:
    file: "logs/system.log"
    rotation: "daily"
    backup_count: 30
    structured_logging: true
    remote_logging:
      enabled: false
      endpoint: "https://logging.example.com"

# Performance Configuration
performance:
  cache:
    enabled: true
    ttl: 3600  # seconds
    max_size: 1000
    
  memory:
    garbage_collection_interval: 300  # seconds
    clear_gpu_cache_after_round: true
    
  optimization:
    compile_model: false  # PyTorch 2.0 compilation
    mixed_precision: true  # Automatic mixed precision
    gradient_checkpointing: false

# Session Management
session:
  storage:
    path: "data/sessions"
    format: "json"  # json | pickle
    compression: false
    
  management:
    auto_save: true
    save_interval: 60  # seconds
    max_sessions: 100
    cleanup_old_sessions: true
    retention_days: 30

# Paths Configuration
paths:
  models: "models/"
  data: "data/"
  logs: "logs/"
  cache: "cache/"
  exports: "exports/"
  offload: "offload/"

# System Requirements Check
system_requirements:
  min_gpu_memory: 16  # GB
  min_ram: 32  # GB
  min_python_version: "3.10"
  required_cuda_version: "11.8"